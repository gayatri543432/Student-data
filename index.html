                <div class="card mt-4">
                    <div class="card-body">
                        <form id="stdContainer">
                            <div class="form-group">
                                <label for="fname" class="sr-only">First name:</label>
                                <input
                                    type="text"
                                    id="fname"
                                    class="form-control"/>
                            </div>
                             <div class="form-group">
                                <label for="lname" class="sr-only">Last name:</label>
                                <input
                                    type="text"
                                    id="lname"
                                    class="form-control"/>
                            </div>
                             <div class="form-group">
                                <label for="email" class="sr-only">Email:</label>
                                <input
                                    type="email"
                                    id="email"
                                    class="form-control"/>
                            </div>
                             <div class="form-group">
                                <label for="contact" class="sr-only">contact:</label>
                                <input
                                    type="text"
                                    id="contact"
                                    class="form-control"/>
                            </div>
                            <button class="btn btn-primary w-100 btn-sm mt-2" id="addbtn">Add Student</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-8">
                <section>
                    <div class="card mt-5">
                        <div class="card-body">
                            <table class="table table">

                                        <th>sr.no</th>

                                        <th>contact</th>

                                </thead>
                                <tbody id="stddata">

                                    </tr> -->
